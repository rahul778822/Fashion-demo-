<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Circuit Fashion | Luxury Redefined</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #ffffff; color: #1a1a1a; line-height: 1.6; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { list-style: none; display: flex; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { text-decoration: none; color: #1a1a1a; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Hero Section */
        .hero { height: 80vh; background: #f4f4f4 url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero-content { background: rgba(0,0,0,0.2); padding: 40px; border-radius: 5px; backdrop-filter: blur(5px); }
        .hero h1 { font-size: 3.5rem; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 20px; }
        .btn { padding: 12px 30px; background: white; color: black; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #1a1a1a; color: white; }

        /* Featured Collection */
        .section { padding: 80px 5%; text-align: center; }
        .section-title { font-size: 2rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 50px; position: relative; }
        .section-title::after { content: ''; width: 50px; height: 2px; background: #000; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { text-align: left; }
        .product-image { width: 100%; height: 450px; background-color: #f0f0f0; object-fit: cover; transition: 0.5s; }
        .product-image:hover { opacity: 0.8; }
        .product-info { margin-top: 15px; }
        .product-info h3 { font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .product-info p { color: #666; font-size: 0.9rem; }

        footer { background: #1a1a1a; color: white; padding: 50px 5%; text-align: center; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Steel Circuit</div>
        <ul class="nav-links">
            <li><a href="#">Shop</a></li>
            <li><a href="#">Collections</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>The Summer Edit</h1>
            <p>Luxury Pret & Couture 2026</p>
            <a href="#" class="btn">View Collection</a>
        </div>
    </header>

    <section class="section">
        <h2 class="section-title">Featured Styles</h2>
        <div class="grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=800&q=80" alt="Fashion 1" class="product-image">
                <div class="product-info">
                    <h3>Silk Embellished Kaftan</h3>
                    <p>₹24,500</p>
                </div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=800&q=80" alt="Fashion 2" class="product-image">
                <div class="product-info">
                    <h3>Floral Organza Saree</h3>
                    <p>₹42,000</p>
                </div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=800&q=80" alt="Fashion 3" class="product-image">
                <div class="product-info">
                    <h3>Velvet Evening Gown</h3>
                    <p>₹58,900</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Steel Circuit Lab Luxury Fashion. All Rights Reserved.
    </footer>

</body>
</html>
